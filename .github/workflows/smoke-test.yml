name: Reproducibility smoke test

on:
  push:
  pull_request:

jobs:
  reproduce-quick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - run: python reproduce_all.py --quick
      - uses: actions/upload-artifact@v4
        with:
          name: quick-reproduction-artifacts
          path: |
            results/generated/
            figures/*.pdf
            figures/*.png
